map $http_x_request_id $request_trace_id {
    default $http_x_request_id;
    "" $request_id;
}
upstream baiterek_api {
    server api:8000;
    keepalive 16;
}
upstream baiterek_web {
    server web:3000;
    keepalive 16;
}
server {
    listen 80;
    server_name _;
    server_tokens off;
    client_max_body_size 20m;
    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
    location = /baiterek { return 302 /baiterek/take; }
    # Versioned API lives at /api/v1/* on the upstream, while health probes
    # live at /health/* (no prefix). Map /baiterek/api/v1/* explicitly so both
    # layouts survive the prefix strip.
    location /baiterek/api/v1/ {
        proxy_pass http://baiterek_api/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_trace_id;
        proxy_read_timeout 120s;
    }
    location /baiterek/api/ {
        proxy_pass http://baiterek_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_trace_id;
        proxy_read_timeout 120s;
    }
    location /baiterek/ {
        proxy_pass http://baiterek_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_trace_id;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    location / { return 404; }
}
