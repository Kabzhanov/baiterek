name: baiterek
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-baiterek}
      POSTGRES_USER: ${POSTGRES_USER:-baiterek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks: [internal]
  api:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    environment:
      BAITEREK_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-baiterek}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-baiterek}
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      LLM_API_KEY: ${LLM_API_KEY:-}
      # Демо-стенд без логинов: любой посетитель работает и в /take, и в /create (см. config.py).
      BAITEREK_OPEN_ACCESS: ${BAITEREK_OPEN_ACCESS:-1}
    depends_on:
      postgres: {condition: service_healthy}
    healthcheck:
      test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/ready', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [internal]
  web:
    build:
      context: ./frontend
      target: runner
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/baiterek/api}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/baiterek/api}
      # Runtime-only override for server-side (SSR) fetches: inside the compose
      # network the API is reached directly; browsers keep the built-in
      # "/baiterek/api" default and go through nginx.
      NEXT_PUBLIC_API_URL: http://api:8000/api
    depends_on:
      api: {condition: service_healthy}
    healthcheck:
      test: [CMD, node, -e, "fetch('http://127.0.0.1:3000/baiterek/take').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [internal]
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["127.0.0.1:${HTTP_PORT:-8080}:80"]
    volumes: [./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro]
    depends_on:
      api: {condition: service_healthy}
      web: {condition: service_healthy}
    healthcheck:
      test: [CMD, wget, -qO-, http://127.0.0.1/nginx-health]
      interval: 15s
      timeout: 5s
      retries: 5
    networks: [internal]
networks:
  internal: {driver: bridge}
volumes:
  postgres_data:
