name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  infrastructure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Compose
        env:
          POSTGRES_PASSWORD: ci-only-not-a-secret
          SECRET_KEY: ci-only-not-a-secret-value-32chars
        run: docker compose config --quiet
      - name: Validate nginx configuration
        # add-host: статические upstream'ы api/web резолвятся compose-сетью, которой нет при standalone nginx -t
        run: docker run --rm --add-host api:127.0.0.1 --add-host web:127.0.0.1 -v "$PWD/deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro" nginx:1.27-alpine nginx -t
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: baiterek
          POSTGRES_PASSWORD: baiterek
          POSTGRES_DB: baiterek_test
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U baiterek"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BAITEREK_DATABASE_URL: postgresql+asyncpg://baiterek:baiterek@127.0.0.1:55432/baiterek_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        with:
          python-version: '3.12'
          cache: pip
      - name: Install backend
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        run: pip install -e './backend[dev]'
      - name: Migrate test database
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        working-directory: backend
        run: python -m alembic upgrade head
      - name: Lint, typecheck, and test backend
        if: ${{ hashFiles('backend/pyproject.toml') != '' }}
        run: ruff check backend && mypy backend/app && pytest backend/tests
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: ${{ hashFiles('frontend/package-lock.json') != '' }}
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        if: ${{ hashFiles('frontend/package-lock.json') != '' }}
        working-directory: frontend
        run: npm ci
      - name: Lint, typecheck, and build frontend
        if: ${{ hashFiles('frontend/package-lock.json') != '' }}
        working-directory: frontend
        run: npm run lint && npm run typecheck && npm run build
  hardcode-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for hardcoded domain terms
        run: make lint-hardcode
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
